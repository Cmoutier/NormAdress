<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Feuille Excel -->
  <rect x="8" y="10" width="40" height="50" rx="5" fill="#1E6B3C"/>
  <!-- Onglet -->
  <rect x="11" y="5" width="14" height="7" rx="2" fill="#155230"/>

  <!-- Lignes de grille horizontales -->
  <line x1="11" y1="24" x2="44" y2="24" stroke="#3a9e65" stroke-width="0.8"/>
  <line x1="11" y1="32" x2="44" y2="32" stroke="#3a9e65" stroke-width="0.8"/>
  <line x1="11" y1="40" x2="44" y2="40" stroke="#3a9e65" stroke-width="0.8"/>
  <line x1="11" y1="48" x2="44" y2="48" stroke="#3a9e65" stroke-width="0.8"/>
  <!-- Ligne verticale -->
  <line x1="26" y1="12" x2="26" y2="56" stroke="#3a9e65" stroke-width="0.8"/>

  <!-- En-tête -->
  <rect x="11" y="12" width="15" height="10" fill="#155230" rx="1"/>
  <rect x="27" y="12" width="17" height="10" fill="#155230" rx="1"/>

  <!-- Cellules vertes (données conformes) -->
  <rect x="11" y="25" width="15" height="6" fill="#2d8a52"/>
  <rect x="27" y="25" width="17" height="6" fill="#2d8a52"/>
  <rect x="11" y="33" width="15" height="6" fill="#27ae60"/>
  <rect x="27" y="33" width="17" height="6" fill="#27ae60"/>

  <!-- Coches dans cellules vertes -->
  <polyline points="29,36 31,38.5 36,33.5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="13,36 15,38.5 20,33.5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baguette magique -->
  <line x1="42" y1="56" x2="54" y2="22" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  <!-- Étoile au bout -->
  <polygon points="54,14 55.5,19 60,19 56.5,22 58,27 54,24 50,27 51.5,22 48,19 52.5,19" fill="#F5C842"/>
  <!-- Étincelles -->
  <circle cx="60" cy="14" r="2" fill="#F5C842"/>
  <circle cx="63" cy="20" r="1.3" fill="white"/>
  <circle cx="57" cy="9"  r="1.5" fill="#F5C842"/>
  <circle cx="62" cy="26" r="1"   fill="white"/>

</svg>
